name: Build APK

# يعمل هذا الملف تلقائيًا عند رفع أي تعديل إلى الفرع الرئيسي main،
# أو يمكن تشغيله يدويًا من تبويب Actions في مستودع GitHub.
# الناتج: ملف .apk جاهز للتحميل من قسم "Artifacts" في نتيجة التشغيل،
# دون الحاجة لأي جهاز كمبيوتر أو تثبيت Flutter محليًا.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # يبني ملفات Hive Adapter تلقائيًا من ملفات .g.dart الموجودة أصلًا
      # في المستودع، لكن هذه الخطوة تعيد توليدها في حال تعديل الموديلات
      - name: Generate Hive adapters (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: Run analyzer
        run: flutter analyze
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release

      - name: Build split APKs per ABI (smaller downloads)
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ruqyah-app-release-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
