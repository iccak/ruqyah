name: ruqyah_app
description: "تطبيق الرقية الشرعية - مشغل رقية مخصص يعمل بدون إنترنت"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Audio playback + background service
  just_audio: ^0.9.40
  audio_service: ^0.18.15

  # Local storage
  path_provider: ^2.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # File picking for importing mp3 files
  file_picker: ^8.1.2

  # Unique ids for saved items
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Arabic app assets (fonts folder can hold a custom Arabic font if desired)
  # assets:
  #   - assets/fonts/
